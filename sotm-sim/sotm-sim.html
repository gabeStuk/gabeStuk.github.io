<!DOCTYPE html>
<html>

<head>
    <title>SOTM Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
        }

        canvas {
            background: #1e1e1e;
            display: block;
        }

        div {
            position: fixed;
            top: 20px;
            right: 20px;

            background: rgba(30, 30, 30, 0.85);
            color: white;

            padding: 15px;
            border-radius: 10px;

            display: flex;
            flex-direction: column;
            gap: 8px;

            font-family: Arial, sans-serif;
            z-index: 10;
        }

        div input {
            padding: 5px;
            border-radius: 5px;
            border: none;
        }
    </style>
</head>

<body>
    <div>
        <label for="spd">Angle</label>
        <input id="spd" type="number">
    </div>
    <canvas id="sim"></canvas>
    <script>
        const canvas = document.getElementById("sim");
        const ctx = canvas.getContext("2d");
        const spd = document.getElementById("spd");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let currSpeed = 0;
        let currShooterSpeed = 0;
        let angle = 45;

        function rpmToMps(rpm, wheelRad = 0.0508) {
            return /*efficiency*/0.42 * 2 * Math.PI * wheelRad * rpm / 60;
        }

        const shooterTable = [
            [0, 2800],
            [1.97993, 2900],
            [3.162, 3400],
            [5.182, 3847],
        ]

        function getSpeedFromShooterTable(dist) {
            if (dist < shooterTable[0][0])
                return shooterTable[0][1];
            for (var i = 0; i < shooterTable.length - 1; i++) {
                ds0 = shooterTable[i];
                ds1 = shooterTable[i + 1];
                if (dist === ds0[0]) return ds0[1];
                if (dist === ds1[0]) return ds1[1];
                if (ds0[0] < dist && dist < ds1[0]) {
                    t = (dist - ds0[0]) / (ds1[0] - ds0[0]);
                    return ds0[1] + t * (ds1[1] - ds0[1]);
                }
            }

            return shooterTable[shooterTable.length - 1][1];
        }

        spd.value = angle;

        function update(p, t) {
            p.x = p.ix + p.vx * t;
            p.y = p.iy + p.vy * t;
        }

        let lastTime = null;
        let previewTime = 0;
        let maxTime = 1;
        let simShot = null;
        function animate(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            previewTime += dt;
            previewTime %= maxTime;
            update(previewRobot, previewTime);
            previewBall.ix = previewRobot.x;
            previewBall.iy = previewRobot.y;
            update(previewBall, previewTime);
            draw();
            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);

        function worldToScreen(x, y) {
            const sx = x / world.xmax * canvas.width;
            const sy = canvas.height - y / world.ymax * canvas.height;
            return { x: sx, y: sy };
        }

        function screenToWorld(sx, sy) {
            const x = sx / canvas.width * world.xmax;
            const y = (canvas.height - sy) / canvas.height * world.ymax;
            return { x, y };
        }

        state = {
            "robot": { "x": 2, "y": 4.040 },
            "target": { "x": 4.623, "y": 4.040 },
            "vel": { "dx": 0, "dy": 0 }
        }

        function drawGrid() {
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 1;
            for (let x = 0; x <= world.xmax; x++) {
                const p = worldToScreen(x, 0);
                ctx.beginPath();
                ctx.moveTo(p.x, 0);
                ctx.lineTo(p.x, canvas.height);
                ctx.stroke();
            }

            for (let y = 0; y <= world.ymax; y++) {
                const p = worldToScreen(0, y);
                ctx.beginPath();
                ctx.moveTo(0, p.y);
                ctx.lineTo(canvas.width, p.y);
                ctx.stroke();
            }

            ctx.strokeStyle = "#666";
            ctx.lineWidth = 2;
            const origin = worldToScreen(0, 0);
            ctx.beginPath();
            ctx.moveTo(0, origin.y);
            ctx.lineTo(canvas.width, origin.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(origin.x, 0);
            ctx.lineTo(origin.x, canvas.height);
            ctx.stroke();
        }

        function drawLinePolar(p, r, theta) {
            const u = { x: Math.cos(theta), y: Math.sin(theta) };
            const ex = p.x + u.x * r;
            const ey = p.y + u.y * r;
            const sscreen = worldToScreen(p.x, p.y);
            const escreen = worldToScreen(ex, ey);
            ctx.beginPath();
            ctx.moveTo(sscreen.x, sscreen.y);
            ctx.lineTo(escreen.x, escreen.y);
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function draw() {
            let line = 1; // indexed from 1
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const { robot, target, vel } = state;

            ctx.globalAlpha = 0.5;
            ctx.drawImage(
                bimg,
                0,
                0,
                canvas.width,
                canvas.height
            );
            ctx.globalAlpha = 1;

            drawGrid();

            ctx.fillStyle = "cyan";
            ctx.beginPath();
            const r = worldToScreen(robot.x, robot.y);
            ctx.arc(r.x, r.y, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillText(`Robot {${state.robot.x}, ${state.robot.y}} m`, 10, 30 * line++);

            ctx.fillStyle = "red";
            ctx.beginPath();
            const t = worldToScreen(target.x, target.y);
            ctx.arc(t.x, t.y, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillText(`Goal {${state.target.x}, ${state.target.y}} m`, 10, 30 * line++);

            ctx.fillStyle = "white";
            ctx.fillText(`Ball speed (field relative): ${currSpeed} m/s (averaged over travel)`, 10, 30 * line++);
            ctx.fillText(`Shooter omega: ${currShooterSpeed} rpm`, 10, 30 * line++);
            ctx.fillText(`Num Iterations: ${curr_iterations.length}`, 10, 30 * line++);

            if (simShot !== null) {
                const scr = [worldToScreen(previewRobot.x, previewRobot.y), worldToScreen(previewBall.x, previewBall.y)];
                const rad = [10, 5];
                const c = ["cyan", "yellow"];
                ctx.globalAlpha = 0.2;
                for (var i = 0; i < 2; i++) {
                    ctx.beginPath();
                    ctx.fillStyle = c[i];
                    ctx.arc(scr[i].x, scr[i].y, rad[i], 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.strokeStyle = 'green';
                drawLinePolar(previewRobot, simShot.r, simShot.theta);
            }

            ctx.globalAlpha = 1;

            ctx.strokeStyle = "yellow";
            ctx.fillStyle = "yellow";
            ctx.font = "16px Arial";
            ctx.lineWidth = 3;
            ctx.beginPath();
            const end = worldToScreen(robot.x + vel.dx, robot.y + vel.dy);
            ctx.moveTo(r.x, r.y);
            ctx.lineTo(end.x, end.y);
            ctx.stroke();
            ctx.fillText(`Velocity {${vel.dx}, ${vel.dy}} m/s`, 10, 30 * line++);

            ctx.strokeStyle = 'green'
            ctx.fillStyle = 'green'
            ctx.lineWidth = 3;
            for (var i = 0; i < curr_iterations.length; i++) {
                ctx.globalAlpha = (i + 1) / curr_iterations.length;
                ctx.beginPath();
                const end = worldToScreen(curr_iterations[i].virtualTargetPos.x, curr_iterations[i].virtualTargetPos.y);
                ctx.moveTo(r.x, r.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(end.x, end.y, 15, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.fillText("Virtual Target(s) / Actual Shot Trajectory(ies)", 10, 30 * line++);

            ctx.strokeStyle = 'purple'
            ctx.fillStyle = 'purple'
            ctx.lineWidth = 3;
            for (var i = 0; i < curr_iterations.length; i++) {
                ctx.globalAlpha = (i + 1) / curr_iterations.length;
                ctx.beginPath();
                const end = worldToScreen(curr_iterations[i].actualTrajectoryEnd.x, curr_iterations[i].actualTrajectoryEnd.y);
                ctx.moveTo(r.x, r.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();
            }
            ctx.fillStyle = '#d5a'
            ctx.fillText("Effective Shot Trajectory(ies)", 10, 30 * line++);
        }

        window.addEventListener("keydown", (k) => {
            if (document.activeElement !== spd || k.key !== "Enter" || Math.abs(spd.value) === 0) return;
            angle = spd.value;
            const mouse = worldToScreen(state.vel.dx + state.robot.x, state.vel.dy + state.robot.y);
            mouseup({
                clientX: mouse.x,
                clientY: mouse.y,
            }, true);
        });

        function mouseup(e, overrideDrag = false) {
            if ((!dragging && !overrideDrag) || !state) return;
            const { robot } = state;

            const mouse = screenToWorld(e.clientX, e.clientY);

            const dx = mouse.x - robot.x;
            const dy = mouse.y - robot.y;

            state.vel.dx = dx;
            state.vel.dy = dy;
            dragging = false;

            curr_iterations = runIterations({ x: dx, y: dy }, 5);

            previewRobot.ix = state.robot.x;
            previewRobot.iy = state.robot.y;
            previewRobot.vx = dx;
            previewRobot.vy = dy;
            previewBall.ix = state.robot.x;
            previewBall.iy = state.robot.y;
            const realIter = curr_iterations.reduce((min, item) =>
                item.distFromTarget < min.distFromTarget ? item : min
            );
            const ballDir = Math.atan2(realIter.virtualTargetPos.y - state.robot.y, realIter.virtualTargetPos.x - state.robot.x);
            maxTime = realIter.tau;
            currSpeed = Math.hypot((realIter.virtualTargetPos.x - state.robot.x), (realIter.virtualTargetPos.y - state.robot.y)) / maxTime;
            previewBall.vx = currSpeed * Math.cos(ballDir);
            previewBall.vy = currSpeed * Math.sin(ballDir);
            previewTime = 0;
            const x = realIter.virtualTargetPos.x - state.robot.x;
            const y = realIter.virtualTargetPos.y - state.robot.y;
            simShot = { r: Math.hypot(x, y), theta: ballDir };
        }

        canvas.addEventListener("mousedown", (e) => {
            if (e.button === 0)
                dragging = true;
            else if (e.button === 1) {
                state.robot = screenToWorld(e.clientX, e.clientY);
                const mouse = worldToScreen(state.vel.dx + state.robot.x, state.vel.dy + state.robot.y);
                mouseup({
                    clientX: mouse.x,
                    clientY: mouse.y,
                }, true);
                e.preventDefault();
            }
        });
        canvas.addEventListener("mouseup", mouseup);

        const drag = 0.5 * 1.2041 * 0.47 * Math.PI * 0.075 * 0.075;

        function calcTOF(pos, c=drag, y0 = 0.5588, yf = 1.8288, m = 0.226796, g = 9.81, dt = 0.0001) {
            const dist = Math.sqrt(pos.x * pos.x + pos.y * pos.y);
            let ste = getSpeedFromShooterTable(dist);
            currShooterSpeed = ste;
            let sti = shooterTable.findLastIndex(x => x[1] < ste);
            if (sti < 0) sti = 0;
            while (sti <= shooterTable.length - 1) {
                const v0 = rpmToMps(ste);
                console.log(`{${ste}, ${v0}}`)
                const theta = angle * Math.PI / 180;
                let vx = v0 * Math.cos(theta);
                let vy = v0 * Math.sin(theta);
                let passedyf = false;
                let x = 0, y = y0, t = 0;
                while (y > yf || Math.sign(vy) > 0) {
                    if (y > yf) passedyf = true;
                    const ax = - (c / m) * vx;
                    const ay = -g - (c / m) * vy;
                    vx += ax * dt;
                    vy += ay * dt;
                    x += vx * dt;
                    y += vy * dt;
                    if (!passedyf && vy < 0) break;
                    console.log(y);
                    t += dt;
                }
                console.log(x - dist);
                if (x >= dist && passedyf) return t;
                else {
                    if (sti < shooterTable.length - 1) {
                        ste = shooterTable[++sti][1];
                        currShooterSpeed = ste;
                    } else return (currTime = Number.MAX_SAFE_INTEGER);
                }
            }

        }

        function runIterations(robotVel, maxIter, allowEarlyTermination = true) {
            const iterations = [];
            if (!state.robot || !state.target) {
                return iterations;
            }
            const initialRelativePos = {
                x: state.target.x - state.robot.x,
                y: state.target.y - state.robot.y
            };
            let currentRelativePos = {
                ...initialRelativePos
            };
            let prevTOF = null;
            for (let iter = 0; iter < maxIter; iter++) {
                let tau_prev;
                if (prevTOF !== null) {
                    tau_prev = prevTOF;
                } else {
                    tau_prev = calcTOF(currentRelativePos);
                }
                const virtualTargetOffset = {
                    x: tau_prev * (-robotVel.x),
                    y: tau_prev * (-robotVel.y)
                };
                const virtualTargetPos = {
                    x: state.target.x + virtualTargetOffset.x,
                    y: state.target.y + virtualTargetOffset.y
                };
                const virtualTargetRelativePos = {
                    x: virtualTargetPos.x - state.robot.x,
                    y: virtualTargetPos.y - state.robot.y
                };
                const tau = calcTOF(virtualTargetRelativePos);
                const actualTrajectoryEnd = {
                    x: virtualTargetPos.x + robotVel.x * tau,
                    y: virtualTargetPos.y + robotVel.y * tau
                };
                const actualOffset = {
                    x: actualTrajectoryEnd.x - state.target.x,
                    y: actualTrajectoryEnd.y - state.target.y
                }
                iterations.push({
                    iteration: iter + 1,
                    relativePos: {
                        ...currentRelativePos
                    },
                    tau: tau,
                    virtualTargetPos: virtualTargetPos,
                    virtualTargetOffset: virtualTargetOffset,
                    actualTrajectoryEnd: actualTrajectoryEnd,
                    distFromTarget: Math.sqrt(actualOffset.x * actualOffset.x + actualOffset.y * actualOffset.y),
                    tau_prev: tau_prev
                });
                if (prevTOF !== null) {
                    const step = Math.abs(tau - prevTOF);
                    if (allowEarlyTermination && step < 0.01)
                        break;
                    if (!allowEarlyTermination && step <= 1e-12 * Math.max(1, Math.abs(tau)))
                        break;
                }
                currentRelativePos = {
                    x: virtualTargetPos.x - state.robot.x,
                    y: virtualTargetPos.y - state.robot.y
                };
                prevTOF = tau;
            }
            return iterations;
        }

        canvas.addEventListener("mousemove", async (e) => {
            if (!dragging || !state) return;

            const { robot } = state;

            const mouse = screenToWorld(e.clientX, e.clientY);

            const dx = mouse.x - robot.x;
            const dy = mouse.y - robot.y;

            state.vel.dx = dx;
            state.vel.dy = dy;
        });
    </script>
</body>
